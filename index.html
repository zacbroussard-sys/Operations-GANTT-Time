<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carvertise Campaign Gantt</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f8f7;color:#1a1a18;font-size:13px}
#app{padding:.75rem}
#loadingState{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:12px;color:#666}
.spinner{width:32px;height:32px;border:3px solid #e0e0dd;border-top-color:#1D9E75;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#errorState{display:none;background:#FCEBEB;border:1px solid #F7C1C1;border-radius:8px;padding:16px;margin:20px;color:#A32D2D}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:.4rem;flex-wrap:wrap}
.toolbar select,.toolbar input[type=text]{font-size:12px;padding:3px 8px;border:0.5px solid #d0d0cc;border-radius:6px;background:#fff;color:#1a1a18;height:28px}
.toolbar label{font-size:11px;color:#666;display:flex;align-items:center;gap:3px}
.toolbar-divider{width:1px;height:20px;background:#d8d8d4;flex-shrink:0}
.stats-inline{display:flex;gap:4px;align-items:center;margin-left:auto;flex-wrap:wrap}
.stat-chip{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;border:0.5px solid transparent;white-space:nowrap}
.stat-chip .val{font-size:13px;font-weight:600}
.stat-chip .lbl{font-size:10px;color:inherit;opacity:.75}
.gantt-wrap{overflow:hidden;border:0.5px solid #d8d8d4;border-radius:8px;background:#fff}
.gantt-header{display:grid;position:sticky;top:0;background:#f4f4f2;z-index:10;border-bottom:0.5px solid #d8d8d4}
.month-labels{display:flex;border-bottom:0.5px solid #d8d8d4;position:relative;height:22px}
.month-lbl{font-size:12px;color:#333;padding:3px 6px;border-right:0.5px solid #d8d8d4;font-weight:700;flex-shrink:0;overflow:hidden;white-space:nowrap;display:flex;align-items:center}
.week-labels{position:relative;height:18px;border-bottom:0.5px solid #d8d8d4;background:#fafaf8}
.week-lbl{position:absolute;font-size:9px;color:#999;font-weight:500;top:2px;transform:translateX(-50%);white-space:nowrap}
.week-tick{position:absolute;top:0;bottom:0;width:1px;background:#e4e4e0}
.group-header{background:#e8e8e4;padding:7px 10px;font-size:13px;font-weight:600;color:#444;display:flex;align-items:center;gap:6px;border-bottom:0.5px solid #d8d8d4;border-top:1.5px solid #d0d0cc;flex-wrap:wrap}
.group-badge{font-size:11px;padding:2px 7px;border-radius:8px;font-weight:600}
.alert-badge{font-size:9px;padding:1px 4px;border-radius:3px;background:#FCEBEB;color:#A32D2D;font-weight:500}
.warn-badge{font-size:9px;padding:1px 4px;border-radius:3px;background:#FFF3CD;color:#7A4F00;font-weight:500}
.row{display:grid;border-bottom:0.5px solid #ebebea;align-items:center;min-height:38px;background:#fff}
.row:hover{background:#f8f8f7}
.row.overdue-row{background:#FDECEA;border-left:3px solid #E24B4A}
.row.attention-row{background:#FEF3C7;border-left:3px solid #F59E0B}
.row.deinst-overdue-row{background:#FDECEA;border-left:3px solid #A32D2D}
.row.ended-row{background:#F8F8F7}
.row-left{padding:2px 8px;display:flex;flex-direction:column;gap:2px;justify-content:center;min-height:38px}
.row-name{font-size:11px;color:#1a1a18;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.row-name.overdue{color:#A32D2D;font-weight:500}
.row-name.attention{color:#7A4F00;font-weight:500}
.row-name.ended{color:#aaa}
.prog-wrap{display:flex;gap:3px;align-items:center}
.prog-label{font-size:9px;color:#999;white-space:nowrap;width:52px;flex-shrink:0}
.prog-track{height:4px;border-radius:2px;background:#ebebea;border:0.5px solid #d8d8d4;flex:1;position:relative;overflow:hidden;min-width:40px;max-width:100px}
.prog-fill{height:100%;border-radius:2px;position:absolute;left:0;top:0}
.prog-count{font-size:9px;font-weight:500;min-width:26px;text-align:right;flex-shrink:0}
.timeline-cell{position:relative;height:38px;overflow:hidden}
.bar-preroad{position:absolute;height:12px;top:13px;border-radius:2px;overflow:hidden;cursor:pointer;display:flex;transition:opacity .15s}
.bar-preroad:hover{opacity:.8}
.bar-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:500;overflow:hidden;white-space:nowrap;flex-shrink:0}
.bar-onroad{position:absolute;height:12px;top:13px;border-radius:2px;cursor:pointer;background:#1D9E75;transition:opacity .15s}
.bar-onroad:hover{opacity:.8}
.bar-onroad.ended{background:#B4B2A9;opacity:.6}
.bar-deinst-live{position:absolute;height:12px;top:13px;border-radius:2px 0 0 2px;background:#9FE1CB;opacity:.5;pointer-events:none}
.bar-deinst-window{position:absolute;height:12px;top:13px;cursor:pointer;transition:opacity .15s;border-radius:0 2px 2px 0}
.bar-deinst-window:hover{opacity:.85}
.bar-pending{position:absolute;height:12px;top:13px;border-radius:2px;border:1.5px dashed;cursor:pointer}
.buf-overlay{position:absolute;height:12px;top:13px;border-radius:1px;pointer-events:none;z-index:3;background:repeating-linear-gradient(-45deg,rgba(80,36,2,.65) 0px,rgba(80,36,2,.65) 2px,transparent 2px,transparent 6px)}
.monthly-tick{position:absolute;top:13px;width:1.5px;height:12px;background:rgba(255,255,255,.65);pointer-events:none;z-index:5}
/* Report markers — shape per type, always fixed color */
.report-marker{position:absolute;cursor:pointer;z-index:6;transition:transform .12s}
/* POI — diamond */
.report-marker-poi{top:15px;width:9px;height:9px;background:#6B63D4;transform:translateX(-50%) rotate(45deg);border:1px solid rgba(255,255,255,.7);border-radius:1px}
.report-marker-poi:hover{transform:translateX(-50%) rotate(45deg) scale(1.5)}
/* CLA — circle */
.report-marker-cla{top:15px;width:10px;height:10px;background:#0C447C;border-radius:50%;transform:translateX(-50%);border:1.5px solid rgba(255,255,255,.7)}
.report-marker-cla:hover{transform:translateX(-50%) scale(1.5)}
/* CRA — square */
.report-marker-cra{top:15px;width:9px;height:9px;background:#712B13;border-radius:2px;transform:translateX(-50%);border:1px solid rgba(255,255,255,.7)}
.report-marker-cra:hover{transform:translateX(-50%) scale(1.5)}
/* Missing cars — simple red outline */
.bar-onroad.missing-cars{outline:2px solid #E24B4A;outline-offset:-1px}
.start-label{position:absolute;top:1px;font-size:8px;font-weight:500;white-space:nowrap;pointer-events:none;z-index:5;transform:translateX(-50%)}
.days-label{position:absolute;top:13px;height:12px;display:flex;align-items:center;font-size:8px;font-weight:500;white-space:nowrap;pointer-events:none;z-index:5;padding:0 2px}
.today-line{position:absolute;top:0;bottom:0;width:1.5px;background:#E24B4A;z-index:6;pointer-events:none}
.today-line::before{content:'today';position:absolute;top:0;left:3px;font-size:8px;color:#E24B4A;white-space:nowrap}
.start-marker{position:absolute;top:9px;bottom:9px;width:2px;z-index:5;border-radius:1px;pointer-events:none}
.tooltip{position:fixed;background:#fff;border:0.5px solid #d0d0cc;border-radius:8px;padding:10px 12px;font-size:11px;z-index:100;pointer-events:none;max-width:300px;display:none;box-shadow:0 4px 16px rgba(0,0,0,.12);max-height:90vh;overflow-y:auto}
.t-name{font-weight:500;margin-bottom:5px;color:#1a1a18;font-size:12px}
.t-row{display:flex;justify-content:space-between;gap:10px;margin-bottom:2px;color:#666}
.t-val{color:#1a1a18;font-weight:500;text-align:right}
.t-val.due-soon{color:#E24B4A}
.t-val.overdue{color:#A32D2D}
.t-section{font-size:10px;font-weight:500;color:#999;margin:5px 0 2px;border-top:0.5px solid #ebebea;padding-top:4px;text-transform:uppercase;letter-spacing:.04em}
.pill{display:inline-block;font-size:10px;padding:1px 6px;border-radius:8px}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:.6rem;align-items:center}
.leg-item{display:flex;align-items:center;gap:4px;font-size:12px;color:#555}
.leg-swatch{width:16px;height:11px;border-radius:2px;flex-shrink:0}
.empty{padding:1.5rem;text-align:center;color:#aaa;font-size:12px}
.attention-section{border:2px solid #3B82C4;border-radius:8px;margin-bottom:.5rem;overflow:hidden;box-shadow:0 2px 8px rgba(59,130,196,.15)}
.attention-header{background:#1E4D7B;padding:7px 12px;font-size:12px;font-weight:600;color:#fff;display:flex;align-items:center;gap:6px}
.refresh-btn{margin-left:auto;font-size:10px;background:#fff;border:0.5px solid #d0d0cc;border-radius:4px;padding:2px 8px;cursor:pointer;color:#666}
.refresh-btn:hover{background:#f0f0ee}
</style>
</head>
<body>
<div id="app">

  <!-- Loading state -->
  <div id="loadingState">
    <div class="spinner"></div>
    <div style="font-size:13px;color:#666">Loading campaign data from Google Sheets…</div>
  </div>

  <!-- Error state -->
  <div id="errorState">
    <strong>Could not load data.</strong> Check that the Google Sheet is published and the URL is correct.<br>
    <span id="errorDetail" style="font-size:11px;margin-top:4px;display:block"></span>
  </div>

  <!-- Main chart — hidden until data loads -->
  <div id="mainChart" style="display:none">
    <div class="toolbar">
      <div><label>Status</label><select id="filterStatus"><option value="">All</option></select></div>
      <div><label>Search</label><input id="search" type="text" placeholder="Name or ID…" style="width:160px"></div>
      <button class="refresh-btn" id="refreshBtn">↻ Refresh</button>
      <span style="font-size:10px;color:#aaa" id="lastUpdated"></span>
      <div class="toolbar-divider"></div>
      <div class="stats-inline" id="summaryBar"></div>
    </div>
    <div class="legend">
      <div class="leg-item"><div class="leg-swatch" style="background:linear-gradient(90deg,#1D9E75 25%,#85B7EB 25% 55%,#AFA9EC 55% 75%,#D3D1C7 75%)"></div>Recruitment bar</div>
      <div class="leg-item"><div class="leg-swatch" style="background:#1D9E75;position:relative;overflow:hidden"><div style="position:absolute;left:4px;top:0;bottom:0;width:1.5px;background:rgba(255,255,255,.65)"></div></div>On road + monthly ticks</div>
      <div class="leg-item"><div style="width:10px;height:10px;background:#6B63D4;transform:rotate(45deg);border-radius:1px;flex-shrink:0"></div>POI (diamond)</div>
      <div class="leg-item"><div style="width:11px;height:11px;background:#0C447C;border-radius:50%;flex-shrink:0"></div>CLA (circle)</div>
      <div class="leg-item"><div style="width:10px;height:10px;background:#712B13;border-radius:2px;flex-shrink:0"></div>CRA (square)</div>
      <div class="leg-item"><div class="leg-swatch" style="background:#1D9E75;outline:2px solid #E24B4A;outline-offset:-1px"></div>Cars missing</div>
      <div class="leg-item"><div class="leg-swatch" style="background:#B4B2A9;opacity:.6"></div>Ended (stale status)</div>
      <div class="leg-item"><div class="leg-swatch" style="background:repeating-linear-gradient(-45deg,rgba(80,36,2,.65) 0 2px,transparent 2px 6px),#D3D1C7"></div>Shop buffer (6d)</div>
      <div class="leg-item"><div class="leg-swatch" style="border:1.5px dashed #B4B2A9;background:transparent"></div>Awaiting art</div>
    </div>
    <div id="attentionSection"></div>
    <div class="gantt-wrap" id="ganttWrap"></div>
    <div class="tooltip" id="tooltip"></div>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const SHEETS_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQLIkLFu1TgP2FYdhvho5WR44XPrXgzob6l1GcC2bH1W6nVk99rIJLb16rXRqgzIzCdDm7rzqSJJJQj/pub?gid=0&single=true&output=csv';
const CORS_PROXY = 'https://corsproxy.io/?';

// ── Constants ─────────────────────────────────────────────────────────────────
const ON_ROAD_SET = new Set(["On Road","Deinstalling"]);
const SHOP_BUFFER=6, DEINST_WINDOW=28, FAR_FUTURE_DAYS=180;
const MIN_LABEL=13, NAME_W=180, PROG_W=148;
const NEAR_PX=16, FAR_PX=5;
let RAW = [];

const STATUS_ORDER=["Interviewing/Scheduling","Scheduled","Not Started","On Road","Deinstalling"];
const STATUS_COLORS={
  "Interviewing/Scheduling":{bg:"#CECBF6",text:"#3C3489",pill:"#AFA9EC"},
  "Scheduled":{bg:"#B5D4F4",text:"#0C447C",pill:"#85B7EB"},
  "Not Started":{bg:"#D3D1C7",text:"#444441",pill:"#B4B2A9"},
  "On Road":{bg:"#9FE1CB",text:"#085041",pill:"#5DCAA5"},
  "Deinstalling":{bg:"#F5C4B3",text:"#712B13",pill:"#F0997B"},
};

// ── CSV Parser ────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  return lines.slice(1).map(line => {
    // Handle quoted fields
    const fields = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { fields.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    fields.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => { obj[h] = fields[i] || ''; });
    return obj;
  });
}

function parseDate(val) {
  if (!val || val === '' || val === 'null') return null;
  const d = new Date(val);
  return isNaN(d.getTime()) ? null : d;
}

function toISO(d) {
  if (!d) return null;
  return d.toISOString().split('T')[0];
}

// ── Load data from Sheets ─────────────────────────────────────────────────────
async function loadData() {
  document.getElementById('loadingState').style.display = 'flex';
  document.getElementById('mainChart').style.display = 'none';
  document.getElementById('errorState').style.display = 'none';

  try {
    // Try direct first, fall back to CORS proxy
    let res;
    try {
      res = await fetch(SHEETS_CSV_URL);
      if (!res.ok) throw new Error('direct failed');
    } catch(e) {
      res = await fetch(CORS_PROXY + encodeURIComponent(SHEETS_CSV_URL));
    }

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const rows = parseCSV(text);

    const TODAY = new Date(); TODAY.setHours(0,0,0,0);

    RAW = rows
      .filter(r => r.id && r.id !== '' && r.status && r.status !== '' && r.name && !r.name.toLowerCase().includes('test'))
      .map(r => {
        const effectiveStart = parseDate(r.effectiveStart);
        const effectiveEnd = parseDate(r.effectiveEnd);
        const daysToStart = effectiveStart ? Math.round((effectiveStart - TODAY) / 86400000) : null;
        return {
          id: parseInt(r.id) || r.id,
          name: r.name,
          status: r.status,
          market: r.market || '',
          effectiveStart: toISO(effectiveStart),
          effectiveEnd: toISO(effectiveEnd),
          barStart: toISO(parseDate(r.barStart)),
          carQty: parseInt(r.carQty) || 0,
          onRoad: parseInt(r.onRoad) || 0,
          offRoad: parseInt(r.offRoad) || 0,
          scheduled: parseInt(r.scheduled) || 0,
          approved: parseInt(r.approved) || 0,
          installedNoPOI: parseInt(r.installedNoPOI) || 0,
          daysToStart,
        };
      });

    // Build dataMap
    RAW.forEach(c => { dataMap[c.id] = c; });

    // Show last updated
    document.getElementById('lastUpdated').textContent = `Data loaded ${new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}`;

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('mainChart').style.display = 'block';
    render();

  } catch(err) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorState').style.display = 'block';
    document.getElementById('errorDetail').textContent = err.message;
  }
}

// ── Live clock ────────────────────────────────────────────────────────────────
function getToday() {
  const d = new Date(); d.setHours(0,0,0,0); return d;
}

// ── Reporting dates ───────────────────────────────────────────────────────────
function addMonths(d,n){const r=new Date(d);r.setMonth(r.getMonth()+n);return r;}
function campaignMonths(es,ee){
  let s=new Date(es),e=new Date(ee);
  if(e<=s)e=addMonths(s,1);
  return Math.min(12,Math.max(1,Math.ceil((e-s)/86400000/30.44)));
}
function reportingDates(c){
  const s=new Date(c.effectiveStart);
  let e=new Date(c.effectiveEnd);
  if(e<=s)e=addMonths(s,1);
  const months=campaignMonths(c.effectiveStart,c.effectiveEnd);
  const poi=new Date(s);poi.setDate(poi.getDate()+7);
  const cla=months>=6?addMonths(s,2):null;
  let cra;
  if(months<=5){const b=addMonths(e,1);cra=new Date(b.getFullYear(),b.getMonth(),15);}
  else{cra=addMonths(e,-2);}
  const monthlies=[];
  let cur=new Date(addMonths(s,1));cur.setDate(10);
  const stop=new Date(addMonths(e,1));stop.setDate(10);
  while(cur<=stop){monthlies.push(new Date(cur));cur=addMonths(cur,1);}
  return{poi,cla,cra,monthlies,months};
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function fmtDate(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function fmtShortDate(ds){const d=new Date(ds);return(d.getMonth()+1)+'/'+(d.getDate());}
function daysUntil(d){return Math.round((d-getToday())/86400000);}
function pct(n,d){return d>0?Math.min(100,Math.max(0,n/d*100)):0;}
function isEndedStatus(c){return c.status==='On Road'&&c.effectiveEnd&&new Date(c.effectiveEnd)<getToday();}
function hasMissingCars(c){return ON_ROAD_SET.has(c.status)&&c.carQty>0&&c.onRoad<c.carQty&&!isEndedStatus(c);}
function isOverdue(c){return c.daysToStart<0&&!ON_ROAD_SET.has(c.status);}
function needsAttention(c){
  if(ON_ROAD_SET.has(c.status))return false;
  const pipe=c.scheduled+c.installedNoPOI,pp=c.carQty>0?pipe/c.carQty:0;
  return(c.daysToStart<=14&&pp<0.5)||(c.daysToStart<=7&&pp===0);
}
function urgencyColor(d,status){
  if(d<0&&!ON_ROAD_SET.has(status))return"#A32D2D";
  if(d<0)return"#B4B2A9";if(d<=7)return"#A32D2D";
  if(d<=14)return"#E24B4A";if(d<=30)return"#EF9F27";
  if(d<=90)return"#FAC775";return"#9FE1CB";
}
function deinstDeadline(c){return addDays(c.effectiveEnd,DEINST_WINDOW);}
function deinstDaysLeft(c){return Math.round((deinstDeadline(c)-getToday())/86400000);}
function isDeinstOverdue(c){return c.status==='Deinstalling'&&c.onRoad>0&&deinstDaysLeft(c)<0;}
function isDeinstComplete(c){return c.status==='Deinstalling'&&c.onRoad===0;}
function deinstWindowColor(c){
  if(isDeinstComplete(c))return'#9FE1CB';
  const dl=deinstDaysLeft(c);
  if(dl<0)return'#A32D2D';if(dl<=7)return'#E24B4A';if(dl<=14)return'#EF9F27';return'#FAC775';
}

// ── Layout ────────────────────────────────────────────────────────────────────
function dateToX(d,viewStart,zoomBoundary){
  const date=typeof d==='string'?new Date(d):d;
  const daysSince=(date-viewStart)/86400000;
  const nearDays=(zoomBoundary-viewStart)/86400000;
  if(daysSince<=0)return daysSince*NEAR_PX;
  if(date<=zoomBoundary)return daysSince*NEAR_PX;
  return nearDays*NEAR_PX+(daysSince-nearDays)*FAR_PX;
}
function getLayout(){
  const nearWeeks=6, farMonths=6;
  const viewStart=addDays(getToday(),-14);
  const zoomBoundary=addDays(getToday(),nearWeeks*7);
  const viewEnd=addDays(getToday(),nearWeeks*7+farMonths*30);
  const totalW=(14+nearWeeks*7)*NEAR_PX+farMonths*30*FAR_PX;
  return{viewStart,zoomBoundary,viewEnd,totalW};
}

// ── Progress bars ─────────────────────────────────────────────────────────────
function buildProgressBars(c){
  const TODAY=getToday();
  const qty=Math.max(c.carQty,1),isD=c.status==='Deinstalling';
  const ended=isEndedStatus(c);
  if(isD){
    const stillPct=Math.min(100,Math.round(c.onRoad/qty*100));
    const dl=deinstDaysLeft(c),complete=isDeinstComplete(c),overdue=isDeinstOverdue(c);
    const barColor=complete?'#1D9E75':overdue?'#A32D2D':dl<=7?'#E24B4A':dl<=14?'#EF9F27':'#FAC775';
    const dlLabel=complete?'✓ done':overdue?`${Math.abs(dl)}d overdue`:dl===0?'due today!':`${dl}d left`;
    const dlColor=complete?'#1D9E75':overdue?'#A32D2D':dl<=7?'#E24B4A':'#EF9F27';
    return`<div class="prog-wrap"><span class="prog-label">still on road</span>
      <div class="prog-track" style="border-color:${barColor}"><div class="prog-fill" style="width:${stillPct}%;background:${barColor}"></div></div>
      <span class="prog-count" style="color:${barColor}">${c.onRoad}/${c.carQty}</span></div>
    <div class="prog-wrap"><span class="prog-label">deadline</span>
      <span style="font-size:9px;font-weight:500;color:${dlColor}">${dlLabel}</span></div>`;
  }
  const onRoad=Math.max(0,c.onRoad),remaining=Math.max(0,qty-onRoad);
  const pipe=c.scheduled+c.installedNoPOI;
  const pipePct=remaining>0?pct(pipe,remaining):100,onRoadPct=pct(onRoad,qty);
  const bothZero=onRoad===0&&pipe===0&&!ON_ROAD_SET.has(c.status);
  let pipeColor="#85B7EB";
  if(remaining===0)pipeColor="#1D9E75";else if(pipePct>=100)pipeColor="#639922";else if(pipePct>0)pipeColor="#BA7517";
  if(ended)pipeColor="#B4B2A9";
  return`<div class="prog-wrap"><span class="prog-label">on road</span>
    <div class="prog-track"><div class="prog-fill" style="width:${onRoadPct}%;background:${ended?'#B4B2A9':'#1D9E75'}"></div></div>
    <span class="prog-count" style="color:${ended?'#B4B2A9':'#1D9E75'}">${onRoad}/${qty}</span></div>
  <div class="prog-wrap"><span class="prog-label">${ended?'ended':'sched+POI'}</span>
    ${ended?`<span style="font-size:9px;color:#A32D2D;font-weight:500">⚠ stale status</span>`:`
    <div class="prog-track" style="${bothZero?'border-color:#E24B4A':''}"><div class="prog-fill" style="width:${pipePct}%;background:${pipeColor}"></div></div>
    <span class="prog-count" style="color:${bothZero?'#A32D2D':pipeColor}">${pipe}/${remaining}</span>`}
  </div>`;
}

// ── Timeline ──────────────────────────────────────────────────────────────────
function buildTimeline(c,layout){
  const TODAY=getToday();
  const{viewStart,zoomBoundary,totalW}=layout;
  const clamp=x=>Math.max(-20,Math.min(totalW+20,x));
  const X=d=>clamp(dateToX(d,viewStart,zoomBoundary));
  let html=`<div class="today-line" style="left:${X(TODAY)}px"></div>`;
  html+=`<div style="position:absolute;top:0;bottom:0;left:${X(zoomBoundary)}px;width:2px;background:repeating-linear-gradient(180deg,rgba(100,100,200,.12) 0 3px,transparent 3px 6px);pointer-events:none;z-index:4"></div>`;
  const qty=Math.max(c.carQty,1),urgColor=urgencyColor(c.daysToStart,c.status),rd=reportingDates(c);
  const ended=isEndedStatus(c);

  if(c.status==='Not Started'){
    const sx=X(c.effectiveStart),ex=X(c.effectiveEnd),bw=Math.max(4,ex-sx);
    html+=`<div class="bar-pending" style="left:${sx}px;width:${bw}px;border-color:${urgColor}" onmouseenter="showTip(event,'${c.id}')" onmouseleave="hideTip()"></div>`;
    if(sx>=0&&sx<=totalW)html+=`<div class="start-label" style="left:${sx}px;color:${urgColor}">${fmtShortDate(c.effectiveStart)}</div>`;
    if(c.daysToStart>0&&bw>22)html+=`<div class="days-label" style="left:${sx+4}px;color:${urgColor}">${c.daysToStart}d</div>`;
    return html;
  }

  if(c.barStart){
    const bsx=X(c.barStart),bex=X(c.effectiveStart),bw=Math.max(2,bex-bsx);
    const onRN=Math.max(0,Math.min(c.onRoad,qty)),schN=Math.max(0,Math.min(c.scheduled,qty-onRN));
    const apN=Math.max(0,Math.min(c.approved,qty-onRN-schN)),unN=Math.max(0,qty-onRN-schN-apN);
    const onRW=Math.round(onRN/qty*bw),schW=Math.round(schN/qty*bw),apW=Math.round(apN/qty*bw),unW=Math.max(0,bw-onRW-schW-apW);
    const seg=(w,bg,color,count)=>w<=0?'':`<div class="bar-seg" style="width:${w}px;background:${bg};color:${color}">${w>=MIN_LABEL&&count>0?count:''}</div>`;
    html+=`<div class="bar-preroad" style="left:${bsx}px;width:${bw}px" onmouseenter="showTip(event,'${c.id}')" onmouseleave="hideTip()">
      ${seg(onRW,'#1D9E75','rgba(255,255,255,.9)',onRN)}${seg(schW,'#85B7EB','#0C447C',schN)}${seg(apW,'#AFA9EC','#3C3489',apN)}
      ${unW>0?`<div class="bar-seg" style="width:${unW}px;background:#D3D1C7;color:#888;flex:1">${unW>=MIN_LABEL&&unN>0?unN:''}</div>`:''}
    </div>`;
    const bufSX=X(addDays(c.effectiveStart,-SHOP_BUFFER)),bufW=Math.max(0,bex-bufSX);
    if(bufW>0&&!ended)html+=`<div class="buf-overlay" style="left:${bufSX}px;width:${bufW}px"></div>`;
    if(bex>=0&&bex<=totalW)html+=`<div class="start-label" style="left:${bex}px;color:${ended?'#B4B2A9':urgColor}">${fmtShortDate(c.effectiveStart)}</div>`;
    if(c.daysToStart>0&&bw>22)html+=`<div class="days-label" style="left:${bsx+4}px;color:${urgColor};background:rgba(255,255,255,.7);border-radius:2px;padding:0 2px">${c.daysToStart}d</div>`;
    else if(c.daysToStart<0&&!ON_ROAD_SET.has(c.status)&&bw>22)html+=`<div class="days-label" style="left:${bsx+4}px;color:#A32D2D;background:rgba(255,255,255,.7);border-radius:2px;padding:0 2px">${Math.abs(c.daysToStart)}d OD</div>`;
  }

  if(c.status==='Deinstalling'){
    const rsx=X(c.effectiveStart),rex=X(c.effectiveEnd),ddx=X(deinstDeadline(c));
    const winColor=deinstWindowColor(c),winW=Math.max(2,ddx-rex);
    html+=`<div class="bar-deinst-live" style="left:${rsx}px;width:${Math.max(4,rex-rsx)}px"></div>`;
    if(winW>0)html+=`<div class="bar-deinst-window" style="left:${rex}px;width:${winW}px;background:${winColor};opacity:.75" onmouseenter="showTip(event,'${c.id}')" onmouseleave="hideTip()"></div>`;
    html+=`<div style="position:absolute;top:9px;bottom:9px;width:2px;left:${rex}px;border-radius:1px;background:${winColor};opacity:.5;pointer-events:none"></div>`;
    html+=`<div class="start-label" style="left:${rex}px;color:${winColor}">${fmtShortDate(c.effectiveEnd)}</div>`;
    return html;
  }

  const missing=hasMissingCars(c);
  const rsx=X(c.effectiveStart),rex=X(c.effectiveEnd),barW=Math.max(4,rex-rsx);
  html+=`<div class="bar-onroad ${ended?'ended':''} ${missing&&!ended?'missing-cars':''}" style="left:${rsx}px;width:${barW}px;"
    onmouseenter="showTip(event,'${c.id}')" onmouseleave="hideTip()"></div>`;
  html+=`<div class="start-marker" style="left:${rsx}px;background:${ended?'#B4B2A9':'#1D9E75'}"></div>`;

  if(!ended){
    rd.monthlies.forEach(md=>{
      const mx=X(md);
      if(mx>rsx&&mx<rex)html+=`<div class="monthly-tick" style="left:${mx}px"></div>`;
    });
    const MARKER_COLORS={poi:'#6B63D4',cla:'#0C447C',cra:'#712B13'};
    [{date:rd.poi,label:'POI',type:'poi'},...(rd.cla?[{date:rd.cla,label:'CLA',type:'cla'}]:[]),{date:rd.cra,label:'CRA',type:'cra'}]
    .forEach(m=>{
      const mx=X(m.date);
      if(mx>=0&&mx<=totalW){
        const dl=daysUntil(m.date);
        html+=`<div class="report-marker report-marker-${m.type}" style="left:${mx}px"
          onmouseenter="showReportTip(event,'${m.label}','${fmtDate(m.date)}',${dl})"
          onmouseleave="hideTip()"></div>`;
      }
    });
  } else {
    const endedDaysAgo=Math.round((getToday()-new Date(c.effectiveEnd))/86400000);
    if(rex>=0&&rex<=totalW)html+=`<div class="start-label" style="left:${rex}px;color:#A32D2D;font-size:8px">${endedDaysAgo}d ago</div>`;
  }
  return html;
}

// ── Row & header builders ─────────────────────────────────────────────────────
function buildRow(c,layout,isAttn=false){
  const od=isOverdue(c),missing=hasMissingCars(c)&&c.status!=='Deinstalling';
  const deinstOD=isDeinstOverdue(c),deinstDone=isDeinstComplete(c),dp=c.status==='Deinstalling'&&c.onRoad>0;
  const ended=isEndedStatus(c);
  const rowClass=ended?'ended-row':deinstOD?'deinst-overdue-row':od?'overdue-row':isAttn?'attention-row':'';
  const nameClass=ended?'ended':od?'overdue':isAttn?'attention':'';
  const badges=[
    od&&!ended?`<span class="alert-badge" style="margin-left:3px">!</span>`:'',
    missing?`<span class="alert-badge" style="margin-left:3px">cars missing</span>`:'',
    ended?`<span class="warn-badge" style="margin-left:3px">ended — stale status</span>`:'',
    deinstOD?`<span class="alert-badge" style="margin-left:3px">deinst overdue</span>`:'',
    dp&&!deinstOD?`<span class="warn-badge" style="margin-left:3px">remove ${c.onRoad}</span>`:'',
    deinstDone?`<span style="margin-left:3px;font-size:9px;color:#085041;font-weight:500">✓ cleared</span>`:'',
  ].join('');
  return`<div class="row ${rowClass}" style="grid-template-columns:${NAME_W}px ${PROG_W}px 1fr">
    <div class="row-left"><div class="row-name ${nameClass}" title="${c.name}">${c.name}${badges}</div></div>
    <div style="padding:2px 6px;display:flex;flex-direction:column;gap:2px;justify-content:center">${buildProgressBars(c)}</div>
    <div class="timeline-cell">${buildTimeline(c,layout)}</div>
  </div>`;
}

function buildHeader(layout){
  const{viewStart,zoomBoundary,viewEnd,totalW}=layout;

  // ── Month row ──────────────────────────────────────────────────────────────
  const months=[];
  let mc=new Date(viewStart);mc.setDate(1);
  while(mc<viewEnd){
    const nx=new Date(mc);nx.setMonth(nx.getMonth()+1);
    const x1=Math.max(0,dateToX(mc<viewStart?viewStart:mc,viewStart,zoomBoundary));
    const x2=Math.min(totalW,dateToX(nx,viewStart,zoomBoundary));
    const w=Math.max(0,x2-x1);
    if(w>0)months.push({label:mc.toLocaleDateString('en-US',{month:'short',year:'2-digit'}),w});
    mc=nx;
  }

  // ── Week row — find all Sundays in view ────────────────────────────────────
  const weeks=[];
  // Find first Sunday on or after viewStart
  let wd=new Date(viewStart);
  const dow=wd.getDay(); // 0=Sun
  if(dow!==0) wd.setDate(wd.getDate()+(7-dow));
  while(wd<viewEnd){
    const x=dateToX(wd,viewStart,zoomBoundary);
    if(x>=0&&x<=totalW){
      const inNear=wd<=zoomBoundary;
      const label=`${wd.getMonth()+1}/${wd.getDate()}`;
      weeks.push({x,label,inNear});
    }
    wd=new Date(wd);wd.setDate(wd.getDate()+7);
  }

  const zbX=dateToX(zoomBoundary,viewStart,zoomBoundary);
  const todayX=dateToX(getToday(),viewStart,zoomBoundary);

  return`<div class="gantt-header" style="grid-template-columns:${NAME_W}px ${PROG_W}px 1fr">
    <div style="font-size:12px;font-weight:600;padding:6px 8px;color:#444;border-bottom:0.5px solid #d8d8d4;display:flex;align-items:center">Campaign</div>
    <div style="font-size:12px;font-weight:600;padding:6px 8px;color:#444;border-bottom:0.5px solid #d8d8d4;display:flex;align-items:center">Progress</div>
    <div style="overflow:hidden">
      <div class="month-labels" style="width:${totalW}px">
        ${months.map(m=>`<div class="month-lbl" style="width:${m.w}px">${m.label}</div>`).join('')}
        <div style="position:absolute;top:0;bottom:0;left:${zbX}px;width:1px;background:rgba(100,100,200,.2)"></div>
      </div>
      <div class="week-labels" style="width:${totalW}px">
        ${weeks.map(w=>`
          <div class="week-tick" style="left:${w.x}px"></div>
          ${w.inNear?`<span class="week-lbl" style="left:${w.x}px">${w.label}</span>`:''}
        `).join('')}
        <div style="position:absolute;top:0;bottom:0;left:${todayX}px;width:1.5px;background:rgba(226,75,74,.4)"></div>
      </div>
    </div>
  </div>`;
}

// ── Main render ───────────────────────────────────────────────────────────────
function render(){
  // Recalc daysToStart live on every render
  const TODAY = getToday();
  RAW.forEach(c => {
    if(c.effectiveStart) c.daysToStart = Math.round((new Date(c.effectiveStart) - TODAY) / 86400000);
  });

  const filterStatus=document.getElementById("filterStatus").value;
  const search=document.getElementById("search").value.toLowerCase();
  const layout=getLayout();

  let data=RAW.filter(c=>c.status&&c.status!=="nan"&&c.effectiveStart&&c.effectiveEnd);
  if(filterStatus)data=data.filter(c=>c.status===filterStatus);
  if(search)data=data.filter(c=>c.name.toLowerCase().includes(search)||String(c.id).includes(search));

  const attention=data.filter(c=>needsAttention(c)).sort((a,b)=>a.daysToStart-b.daysToStart);
  const attIds=new Set(attention.map(c=>c.id));
  const overdueCount=data.filter(c=>isOverdue(c)).length;
  const missingCount=data.filter(c=>hasMissingCars(c)&&c.status!=='Deinstalling').length;
  const deinstODCount=data.filter(c=>isDeinstOverdue(c)).length;
  const deinstPendCount=data.filter(c=>c.status==='Deinstalling'&&c.onRoad>0&&!isDeinstOverdue(c)).length;
  const deinstDoneCount=data.filter(c=>isDeinstComplete(c)).length;
  const endedCount=data.filter(c=>isEndedStatus(c)).length;

  const chip=(val,lbl,bg,border,color)=>
    `<div class="stat-chip" style="background:${bg};border-color:${border};color:${color}"><span class="val">${val}</span><span class="lbl">${lbl}</span></div>`;

  document.getElementById("summaryBar").innerHTML=
    STATUS_ORDER.map(s=>{
      const cnt=data.filter(c=>c.status===s).length,col=STATUS_COLORS[s];
      return chip(cnt,s.replace('Interviewing/Scheduling','Int/Sched'),col.bg+'33',col.bg,col.text);
    }).join('')+
    chip(attention.length,'need attn','#FAEEDA','#FAC775','#633806')+
    chip(overdueCount,'overdue','#FCEBEB','#F7C1C1','#A32D2D')+
    (missingCount>0?chip(missingCount,'cars missing','#FFF3CD','#FAC775','#7A4F00'):'')+
    (endedCount>0?chip(endedCount,'stale','#F0F0EE','#D3D1C7','#888'):'')+
    (deinstODCount>0?chip(deinstODCount,'deinst OD','#FCEBEB','#A32D2D','#A32D2D'):'')+
    (deinstPendCount>0?chip(deinstPendCount,'pending rmv','#FFF3CD','#FAC775','#7A4F00'):'')+
    (deinstDoneCount>0?chip(deinstDoneCount,'✓ cleared','#EAF3DE','#9FE1CB','#085041'):'')+
    chip(data.length,'shown','#f4f4f2','#d8d8d4','#444');

  const headerHtml=buildHeader(layout);
  const grouped={};
  STATUS_ORDER.forEach(s=>{grouped[s]=[];});
  data.forEach(c=>{(grouped[STATUS_ORDER.includes(c.status)?c.status:"Not Started"]).push(c);});
  Object.values(grouped).forEach(arr=>arr.sort((a,b)=>{
    const rank=c=>isOverdue(c)?-99999:hasMissingCars(c)&&c.status==='On Road'?-9999:c.daysToStart;
    return rank(a)-rank(b);
  }));

  let attHtml='';
  if(attention.length>0){
    attHtml=`<div class="attention-section"><div class="attention-header">⚠ Needs Attention — ${attention.length} campaign${attention.length>1?'s':''} require action now</div>${headerHtml}`;
    attention.forEach(c=>{attHtml+=buildRow(c,layout,true);});
    attHtml+='</div>';
  }
  document.getElementById("attentionSection").innerHTML=attHtml;

  let html=headerHtml;
  STATUS_ORDER.forEach(status=>{
    if(filterStatus&&status!==filterStatus)return;
    const rows=grouped[status];if(!rows||rows.length===0)return;
    const col=STATUS_COLORS[status];
    const od=rows.filter(c=>isOverdue(c)).length,attn=rows.filter(c=>attIds.has(c.id)).length;
    const miss=rows.filter(c=>hasMissingCars(c)&&c.status!=='Deinstalling').length;
    const dOD=rows.filter(c=>isDeinstOverdue(c)).length;
    const dPend=rows.filter(c=>c.status==='Deinstalling'&&c.onRoad>0&&!isDeinstOverdue(c)).length;
    const dDone=rows.filter(c=>isDeinstComplete(c)).length;
    const endedInGroup=rows.filter(c=>isEndedStatus(c)).length;
    html+=`<div class="group-header"><span>${status}</span>
      <span class="group-badge" style="background:${col.pill};color:${col.text}">${rows.length}</span>
      ${od>0?`<span class="alert-badge">${od} overdue</span>`:''}
      ${attn>0?`<span class="alert-badge" style="background:#FAEEDA;color:#633806">${attn} need attention</span>`:''}
      ${miss>0?`<span class="warn-badge">${miss} cars missing</span>`:''}
      ${endedInGroup>0?`<span style="font-size:9px;padding:1px 4px;border-radius:3px;background:#F0F0EE;color:#888;font-weight:500">${endedInGroup} stale status</span>`:''}
      ${dOD>0?`<span class="alert-badge">${dOD} deinst overdue</span>`:''}
      ${dPend>0?`<span class="warn-badge">${dPend} pending removal</span>`:''}
      ${dDone>0?`<span style="font-size:9px;padding:1px 4px;border-radius:3px;background:#EAF3DE;color:#085041;font-weight:500">${dDone} cleared ✓</span>`:''}
    </div>`;
    rows.forEach(c=>{html+=buildRow(c,layout,false);});
  });

  if(data.length===0)html+=`<div class="empty">No campaigns match your filters.</div>`;
  document.getElementById("ganttWrap").innerHTML=html;
}

// ── Tooltips ──────────────────────────────────────────────────────────────────
const dataMap = {};

function showTip(e,id){
  const c=dataMap[id];if(!c)return;
  const col=STATUS_COLORS[c.status]||STATUS_COLORS["Not Started"];
  const qty=Math.max(c.carQty,1),onRN=Math.min(c.onRoad,qty),remaining=Math.max(0,qty-onRN);
  const schN=Math.min(c.scheduled,qty-onRN),apN=Math.min(c.approved,qty-onRN-schN),unN=Math.max(0,qty-onRN-schN-apN);
  const pipe=c.scheduled+c.installedNoPOI,od=isOverdue(c),isD=c.status==='Deinstalling';
  const ended=isEndedStatus(c);
  const dLabel=c.daysToStart<0?(ON_ROAD_SET.has(c.status)?`Started ${Math.abs(c.daysToStart)}d ago`:`${Math.abs(c.daysToStart)}d overdue`):`${c.daysToStart}d until start`;
  const rd=reportingDates(c);
  const rdRow=(label,date)=>{
    const dl=daysUntil(date),sc=dl<0?'overdue':dl<=7?'due-soon':'';
    const suffix=dl<0?` (${Math.abs(dl)}d OD)`:dl===0?' (today!)':dl<=30?` (${dl}d)`:'';
    return`<div class="t-row"><span>${label}</span><span class="t-val ${sc}">${fmtDate(date)}${suffix}</span></div>`;
  };
  const tip=document.getElementById("tooltip");
  tip.style.display="block";
  tip.innerHTML=`<div class="t-name">${c.name}</div>
    <span class="pill" style="background:${col.bg};color:${col.text};margin-bottom:5px;display:inline-block">${c.status} · ${rd.months}mo</span>
    ${ended?`<div style="background:#FFF3CD;color:#7A4F00;font-size:10px;padding:2px 6px;border-radius:3px;margin-bottom:4px;font-weight:500">⚠ Campaign ended ${Math.round((getToday()-new Date(c.effectiveEnd))/86400000)}d ago — status not updated in source app</div>`:''}
    <div class="t-section">Timeline</div>
    <div class="t-row"><span>Effective start</span><span class="t-val">${c.effectiveStart}</span></div>
    <div class="t-row"><span>Effective end</span><span class="t-val">${c.effectiveEnd}</span></div>
    ${!ON_ROAD_SET.has(c.status)?`<div class="t-row"><span>Recruitment deadline</span><span class="t-val">${dLabel}</span></div>`:''}
    <div class="t-section">Reporting schedule</div>
    ${rdRow('POI report due',rd.poi)}
    ${rd.cla?rdRow('CLA due',rd.cla):'<div class="t-row"><span>CLA</span><span class="t-val" style="color:#aaa">N/A (≤5 months)</span></div>'}
    ${rdRow('CRA due',rd.cra)}
    <div class="t-row"><span>Monthly drops</span><span class="t-val">${rd.monthlies.length} total (10th each mo)</span></div>
    <div class="t-section">${isD?'Removal status':'Pipeline breakdown'}</div>
    ${isD?`<div class="t-row"><span>Cars on road</span><span class="t-val" style="color:${c.onRoad===0?'#1D9E75':'#E24B4A'}">${c.onRoad} / ${c.carQty} (goal: 0)</span></div>`:`
    <div class="t-row"><span><span style="color:#1D9E75">■</span> On road</span><span class="t-val">${onRN} / ${qty}</span></div>
    <div class="t-row"><span><span style="color:#85B7EB">■</span> Scheduled</span><span class="t-val">${schN}</span></div>
    <div class="t-row"><span><span style="color:#AFA9EC">■</span> Approved</span><span class="t-val">${apN}</span></div>
    <div class="t-row"><span>░ Unfilled</span><span class="t-val">${unN}</span></div>`}
    <div class="t-section">Details</div>
    <div class="t-row"><span>Market</span><span class="t-val">${c.market}</span></div>`;
  moveTip(e);
}

function showReportTip(e,label,dateStr,dl){
  const COLORS={POI:'#6B63D4',CLA:'#0C447C',CRA:'#712B13'};
  const DESCS={POI:'Point of Installation — due 7 days after campaign start',CLA:'Campaign Level Analysis — mid-campaign, delivered to prompt renewal',CRA:'Campaign Results Analysis — final performance report'};
  const statusColor=dl<0?'#A32D2D':dl<=7?'#E24B4A':dl<=30?'#EF9F27':'#666';
  const statusLabel=dl<0?`${Math.abs(dl)} days overdue`:dl===0?'Due today!':dl<=7?`Due in ${dl} days`:dl<=30?`Due in ${dl} days`:`In ${dl} days`;
  const tip=document.getElementById("tooltip");
  tip.style.display="block";
  tip.innerHTML=`<div class="t-name" style="color:${COLORS[label]}">◆ ${label} Report</div>
    <div style="font-size:10px;color:#666;margin-bottom:6px">${DESCS[label]}</div>
    <div class="t-row"><span>Due date</span><span class="t-val">${dateStr}</span></div>
    <div class="t-row"><span>Status</span><span class="t-val" style="color:${statusColor}">${statusLabel}</span></div>`;
  moveTip(e);
}

function moveTip(e){
  const t=document.getElementById("tooltip");
  const tw=t.offsetWidth||300, th=t.offsetHeight||200;
  const vw=window.innerWidth, vh=window.innerHeight;
  let x=e.clientX+14, y=e.clientY-10;
  if(x+tw>vw-10) x=e.clientX-tw-10;
  if(y+th>vh-10) y=e.clientY-th-10;
  if(y<10) y=10;
  t.style.left=x+"px"; t.style.top=y+"px";
}
function hideTip(){document.getElementById("tooltip").style.display="none";}
document.addEventListener("mousemove",e=>{if(document.getElementById("tooltip").style.display==="block")moveTip(e);});

// ── Event listeners ───────────────────────────────────────────────────────────
